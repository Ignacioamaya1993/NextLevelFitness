<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="icon" type="image/png" href="../assets/images/favicon/web-app-manifest-512x512.png" sizes="512x512" />
    <link rel="icon" type="image/svg+xml" href="../assets/images/favicon/favicon.svg" />
    <link rel="shortcut icon" href="../assets/images/favicon/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="../assets/images/favicon/apple-touch-icon.png" />
    <link rel="manifest" href="../assets/images/favicon/site.webmanifest" />    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rutinas de Usuario</title>
    <link rel="stylesheet" href="../styles/global.css">
    <link rel="stylesheet" href="../styles/ver-rutinas.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
</head>
<body>

    <!-- 🟢 NAVBAR GLOBAL (Se maneja desde global.css) -->
    <header>
        <div class="header-container">
            <div class="logo">
                <a href="../pages/panel-admin.html">
                    <img src="../assets/images/logos/nextlevel1.png" alt="Next Level Fitness Logo">
                </a>
            </div>

            <div id="overlay" class="hidden"></div>

            <nav>
                <ul class="nav-menu">
                    <li><a href="panel-admin.html">Panel Administrador</a></li>
                    <li><a href="visual-usuarios.html">Usuarios Registrados</a></li>
                    <li><a href="administrar-ejercicios.html">Administrar Ejercicios</a></li>
                    <li><a href="administrar-precios.html">Administrar Precios</a></li>
                </ul>
            </nav>
            
        </div>
    </header>

    <!-- 📌 SECCIÓN PRINCIPAL -->
    <main>
        <h1 id="titulo-rutinas">Rutinas del Usuario <span id="user-name"></span></h1>
        <div id="routine-container">
                <div id="routine-list"></div>
                <button id="download-pdf">
                    <img src="../assets/images/logos/pdf.png" alt="pdf Icon">
                </button>
            </div>            

    <!-- Popup para editar rutina -->
    <div id="edit-popup" class="popup hidden" aria-hidden="true" role="dialog">
        <div id="popup-content" class="popup-content">
            <!-- El contenido del popup se llenará dinámicamente desde JavaScript -->
            <div>
                <label for="series-0">Series:</label>
                <input id="series-0" type="number" min="1" placeholder="Ingresa las series" required>
            </div>
            <div>
                <label for="reps-0">Repeticiones:</label>
                <input id="reps-0" type="number" min="1" placeholder="Ingresa las repeticiones" required>
            </div>
            <div>
                <label for="weight-0">Peso:</label>
                <input id="weight-0" type="number" min="1" placeholder="Ingresa el peso" required>
            </div>
            <!-- Agregar el campo de Información adicional -->
            <div>
                <label for="additionalData-0">Información adicional:</label>
                <textarea id="additionalData-0" rows="4" placeholder="Ingresa información adicional aquí"></textarea>
            </div>
            <!-- Aquí pueden agregarse más campos dinámicos si se requieren -->
        </div>
    </div>

</main>

    <!-- 🔵 FOOTER GLOBAL (Se maneja desde global.css) -->
    <footer>
        <div class="footer-container">
            <div class="footer-info">
            <p>&copy; <span id="year"></span> Next Level Fitness. Todos los derechos reservados.</p>
                <p>Email:<a href="mailto:soutrelleagustin64@gmail.com"> soutrelleagustin64@gmail.com</a></p>
            </div>
            <div class="footer-social">
                <a href="https://www.instagram.com/nextlevel.fitness.2025" target="_blank" class="social-icon" aria-label="Instagram">
                    <i class="fab fa-instagram"></i>
                </a>
                <a href="https://wa.me/5492284235832" target="_blank" class="social-icon" aria-label="WhatsApp">
                    <i class="fab fa-whatsapp"></i>
                </a>
            </div>
            <div class="footer-design">
                <p>Design by Ignacio Amaya</p>
            </div>
        </div>
    </footer>

    <script type="module" src="../scripts/firebaseConfig.js"></script>
    <script type="module" src="../scripts/ver-rutinas.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <script>
  document.getElementById("year").textContent = new Date().getFullYear();
</script>

</body>
</html>
